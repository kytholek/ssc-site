[build]
base = "."
publish = "."

# Production API (checkout, webhook, email) runs on Cloudflare Worker — see wrangler.jsonc.
# This file is kept for optional Netlify static hosting / Decap CMS (admin/) only.

[[redirects]]
from = "/calculator"
to = "/calculator/"
status = 301

[[redirects]]
from = "/services"
to = "/services/"
status = 301

[[redirects]]
from = "/services/"
to = "/index.html"
status = 200

[[redirects]]
from = "/codex"
to = "/codex/"
status = 301

[[redirects]]
from = "/codex/"
to = "/index.html"
status = 200
