[build]
# Set to "." if your site is at the repo root, or to a subfolder name (no leading slash) if needed
base = "."
# Set your build command if you have one, or remove if not needed
# command = "npm run build"
# Set your publish directory (e.g., "dist", "public", or repo root)
publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."stripe-webhook"]
  timeout = 60

[functions."create-checkout"]
  timeout = 15

[dev]
# Optional: port = 8888

# Netlify Identity and Git Gateway do not require special config in netlify.toml, but this file ensures build settings are correct.

# Checkout API — proxy neutral path to Netlify function (bypasses broken Cloudflare /api/session route)
[[redirects]]
from = "/api/session"
to = "/.netlify/functions/create-checkout"
status = 200

[[redirects]]
from = "/calculator"
to = "/calculator/"
status = 301

[[redirects]]
from = "/services"
to = "/services/"
status = 301

[[redirects]]
from = "/services/"
to = "/index.html"
status = 200

[[redirects]]
from = "/codex"
to = "/codex/"
status = 301

[[redirects]]
from = "/codex/"
to = "/index.html"
status = 200

# SPA subpaths — assets must resolve from site root, not /codex/ or /services/
[[redirects]]
from = "/codex/js/*"
to = "/js/:splat"
status = 200

[[redirects]]
from = "/codex/css/*"
to = "/css/:splat"
status = 200

[[redirects]]
from = "/codex/pages/*"
to = "/pages/:splat"
status = 200

[[redirects]]
from = "/services/js/*"
to = "/js/:splat"
status = 200

[[redirects]]
from = "/services/css/*"
to = "/css/:splat"
status = 200

[[redirects]]
from = "/services/pages/*"
to = "/pages/:splat"
status = 200

[[redirects]]
from = "/calculator/js/*"
to = "/js/:splat"
status = 200

[[redirects]]
from = "/calculator/css/*"
to = "/css/:splat"
status = 200

[[redirects]]
from = "/calculator/pages/*"
to = "/pages/:splat"
status = 200
