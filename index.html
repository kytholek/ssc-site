  <!-- ════ PAGE LOADER ════ -->
  <script>
    (function () {
      // Critical pages — fetched immediately, app boots when these are done
      var CRITICAL = [
        { id: 'include-nav',      src: 'pages/nav.html'      },
        { id: 'include-home',     src: 'pages/home.html'     },
        { id: 'include-footer',   src: 'pages/footer.html'   },
        { id: 'include-services', src: 'pages/services.html' },
        { id: 'include-codex',    src: 'pages/codex.html'    },
      ];

      // Secondary pages — fetched in background, don't block app init
      var SECONDARY = [
        { id: 'include-calculator', src: 'pages/calculator.html' },
        { id: 'include-ssc',        src: 'pages/ssc.html'        },
        { id: 'include-books',      src: 'pages/books.html'      },
        { id: 'include-about',      src: 'pages/about.html'      },
        { id: 'include-privacy',    src: 'pages/privacy.html'    },
        { id: 'include-guidebook',  src: 'pages/guidebook-pdf-preview.html' },
        { id: 'include-admin',      src: 'pages/admin.html'      },
      ];

      function loadPage(page) {
        return fetch(page.src)
          .then(function (r) { return r.ok ? r.text() : ''; })
          .then(function (html) {
            var el = document.getElementById(page.id);
            if (el && html) el.innerHTML = html;
            if (page.id === 'include-services' && typeof initServicesPage === 'function') {
              initServicesPage();
            }
            if (page.id === 'include-codex' && typeof initCodexPage === 'function') {
              initCodexPage();
            }
          })
          .catch(function () {});
      }

      function onCriticalLoaded() {
        if (typeof initApp === 'function') initApp();
        if (typeof bootSimulation === 'function') bootSimulation();
        if (typeof adminSystem !== 'undefined' && typeof adminSystem.boot === 'function') {
          adminSystem.boot();
        }
      }

      // Start secondary page fetches immediately so they're ready when initApp runs
      SECONDARY.forEach(loadPage);

      var done = 0;
      CRITICAL.forEach(function (page) {
        loadPage(page).then(function () {
          done++;
          if (done === CRITICAL.length) onCriticalLoaded();
        });
      });
    })();
  </script>
