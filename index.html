<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSC · Simulation Source Code · Numerology</title>
  <meta name="description" content="Discover your seven numerology frequencies.">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Cormorant+SC:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <!-- Stylesheets — base then brand revamp (overrides come after) -->
  <link rel="icon" type="image/png" href="Images/Codex Sigil.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/brand-revamp.css">
  <link rel="stylesheet" href="css/admin.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <!-- ════ NAVIGATION ════ -->
  <div id="include-nav"></div>

  <!-- ════ PAGES ════ -->
  <div id="include-home"></div>
  <div id="include-calculator"></div>
  <div id="include-books"></div>
  <div id="include-blog"></div>
  <div id="include-about"></div>
  <div id="include-privacy"></div>

  <!-- ════ FOOTER ════ -->
  <div id="include-footer"></div>

  <!-- ════ ADMIN OVERLAY ════ -->
  <div id="include-admin"></div>

  <!-- Toast notification (used by admin) -->
  <div id="admin-toast"></div>

  <!-- ════ SCRIPTS ════ -->
  <script src="js/translations.js"></script>
  <script src="js/calculator.js"></script>
  <script src="js/app.js"></script>
  <script src="js/simulation.js"></script>
  <script src="js/admin.js"></script>

  <!-- ════ PAGE LOADER ════ -->
  <script>
    (function () {
      var PAGES = [
        { id: 'include-nav',        src: 'pages/nav.html'        },
        { id: 'include-home',       src: 'pages/home.html'       },
        { id: 'include-calculator', src: 'pages/calculator.html' },
        { id: 'include-books',      src: 'pages/books.html'      },
        { id: 'include-blog',       src: 'pages/blog.html'       },
        { id: 'include-about',      src: 'pages/about.html'      },
        { id: 'include-privacy',    src: 'pages/privacy.html'    },
        { id: 'include-footer',     src: 'pages/footer.html'     },
        { id: 'include-admin',      src: 'pages/admin.html'      },
      ];

      var loaded = 0;

      function onAllLoaded() {
        if (typeof initApp === 'function') initApp();
        if (typeof bootSimulation === 'function') bootSimulation();
        if (typeof adminSystem !== 'undefined' && typeof adminSystem.boot === 'function') {
          adminSystem.boot();
        }
      }

      PAGES.forEach(function (page) {
        fetch(page.src)
          .then(function (r) {
            if (!r.ok) throw new Error('Failed to load ' + page.src);
            return r.text();
          })
          .then(function (html) {
            var el = document.getElementById(page.id);
            if (el) el.innerHTML = html;
            loaded++;
            if (loaded === PAGES.length) onAllLoaded();
          })
          .catch(function (err) {
            console.warn('SSC loader:', err.message);
            loaded++;
            if (loaded === PAGES.length) onAllLoaded();
          });
      });
    })();
  </script>

</body>
</html>
