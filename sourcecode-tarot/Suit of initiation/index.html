<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suit of Initiation — Simulation Source Code Tarot</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #05040a;
    --void2: #0d0b18;
    --gold: #c9a84c;
    --gold-bright: #e8c96b;
    --gold-dim: #7a6230;
    --teal: #4a9494;
    --teal-bright: #7ec8c8;
    --teal-dim: #2a5555;
    --amethyst: #7b4fa6;
    --amethyst-bright: #a96ed4;
    --fire: #e8593c;
    --fire-bright: #f5a623;
    --star: rgba(255,255,255,0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--void);
    color: var(--gold);
    font-family: 'EB Garamond', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Starfield */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 8%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 65%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 25%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 50%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 95% 10%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 90%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 45%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 78% 72%, rgba(255,255,255,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 55%, rgba(255,255,255,0.2) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 3rem 2rem 2rem;
    border-bottom: 1px solid var(--gold-dim);
  }

  .deck-label {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.35em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  header h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.4rem, 4vw, 2.4rem);
    font-weight: 700;
    background: linear-gradient(180deg, var(--gold-bright) 0%, var(--gold) 60%, var(--gold-dim) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.06em;
    margin-bottom: 0.5rem;
  }

  .suit-sigil {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin: 0.8rem 0;
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: var(--fire-bright);
  }

  .suit-sigil::before, .suit-sigil::after {
    content: '';
    height: 1px;
    width: 80px;
    background: linear-gradient(90deg, transparent, var(--fire), transparent);
  }

  header p {
    font-size: 1rem;
    color: rgba(201,168,76,0.6);
    font-style: italic;
    max-width: 500px;
    margin: 0 auto;
  }

  /* Path indicator */
  .path-indicator {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0.5rem;
    padding: 1rem;
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--gold-dim);
  }

  .path-node {
    width: 28px;
    height: 28px;
    border: 1px solid var(--gold-dim);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    color: var(--gold-dim);
    transition: all 0.3s;
  }

  .path-node.active { border-color: var(--fire-bright); color: var(--fire-bright); box-shadow: 0 0 8px var(--fire); }
  .path-arrow { color: var(--gold-dim); font-size: 0.7rem; }

  /* Filter tabs */
  .filter-bar {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    padding: 1.5rem 2rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    padding: 0.4rem 1rem;
    border: 1px solid var(--gold-dim);
    background: transparent;
    color: var(--gold-dim);
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--gold);
    color: var(--gold-bright);
    background: rgba(201,168,76,0.07);
  }

  /* Card grid */
  .card-grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1.5rem;
    padding: 1rem 2rem 4rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* Tarot card */
  .tarot-card {
    aspect-ratio: 0.578;
    position: relative;
    cursor: pointer;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .tarot-card:hover {
    transform: translateY(-8px) scale(1.02);
    z-index: 10;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    border: 1.5px solid var(--gold-dim);
    box-shadow: 0 4px 24px rgba(0,0,0,0.6), inset 0 0 30px rgba(0,0,0,0.3);
  }

  .card-inner svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5,4,10,0.92);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    display: flex;
    gap: 2rem;
    max-width: 900px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-card {
    width: 260px;
    min-width: 260px;
    aspect-ratio: 0.578;
    border: 1.5px solid var(--gold);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(201,168,76,0.15);
    flex-shrink: 0;
  }

  .modal-card svg {
    width: 100%;
    height: 100%;
  }

  .modal-text {
    flex: 1;
    color: var(--gold);
    padding: 1rem 0;
  }

  .modal-number {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--fire-bright);
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }

  .modal-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    background: linear-gradient(180deg, var(--gold-bright), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.4rem;
    line-height: 1.2;
  }

  .modal-directive {
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    color: var(--fire-bright);
    font-style: italic;
    margin-bottom: 1rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--gold-dim);
  }

  .modal-keywords {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 1rem;
  }

  .keyword {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    padding: 0.2rem 0.6rem;
    border: 1px solid var(--teal-dim);
    color: var(--teal-bright);
    text-transform: uppercase;
  }

  .modal-section-title {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 0.4rem;
    margin-top: 0.8rem;
  }

  .modal-text p {
    font-size: 0.95rem;
    line-height: 1.7;
    color: rgba(201,168,76,0.8);
    margin-bottom: 0.5rem;
  }

  .modal-reversed {
    font-style: italic;
    color: rgba(201,168,76,0.55) !important;
  }

  .modal-numerology {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    color: var(--amethyst-bright);
    padding: 0.6rem;
    border-left: 2px solid var(--amethyst);
    margin-top: 0.8rem;
  }

  .close-btn {
    position: fixed;
    top: 1rem;
    right: 1rem;
    width: 40px;
    height: 40px;
    background: var(--void2);
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1001;
    border-radius: 50%;
    transition: all 0.2s;
  }

  .close-btn:hover { border-color: var(--gold); background: rgba(201,168,76,0.1); }

  @keyframes pulse-gold {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  @keyframes rotate-slow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes flicker-fire {
    0%, 100% { opacity: 0.8; transform: scaleY(1); }
    33% { opacity: 1; transform: scaleY(1.05); }
    66% { opacity: 0.7; transform: scaleY(0.97); }
  }

  @media (max-width: 600px) {
    .modal { flex-direction: column; }
    .modal-card { width: 100%; min-width: unset; max-height: 40vh; aspect-ratio: unset; }
    .card-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; padding: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="deck-label">Simulation Source Code Tarot</div>
  <h1>Suit of Initiation</h1>
  <div class="suit-sigil">Fire · Lightning · The Primary Diagonal</div>
  <p>The path of direct transformation. 1→5→9: Perception into Embodiment into Completion.</p>
  <div class="path-indicator">
    <span class="path-node">1</span>
    <span class="path-arrow">→</span>
    <span class="path-node active">5</span>
    <span class="path-arrow">→</span>
    <span class="path-node">9</span>
  </div>
</header>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filterCards('all')">All 14 Cards</button>
  <button class="filter-btn" onclick="filterCards('pip')">Ace – Ten</button>
  <button class="filter-btn" onclick="filterCards('court')">Court Cards</button>
</div>

<div class="card-grid" id="cardGrid"></div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent"></div>
  <button class="close-btn" onclick="closeAllModal()">✕</button>
</div>

<script>
const CARDS = [
  {
    id: 'ace',
    number: 'Ace',
    label: 'ACE OF INITIATION',
    title: 'Ace of Initiation',
    subtitle: 'Pure Potential Activated',
    directive: '"The signal fires. The path begins."',
    type: 'pip',
    color: 'fire',
    keywords: ['Origin','First Spark','Pure Will','The Signal','Activation','Uncontained Fire'],
    path_position: '1 — The Witness',
    upright: 'The program executes its first line. Pure creative fire erupts from potential into actuality—not a decision to begin, but a beginning that has already happened. The Ace is the moment before momentum requires direction. Something fundamental has been switched on inside you. Do not ask if you are ready. You are already moving.',
    reversed: 'Energy without a receiver. Fire that burns but does not illuminate. The spark has landed but found no tinder—nothing prepared for it. Or: the impulse to begin used as a substitute for actually beginning. The match struck a thousand times but never applied.',
    numerology: 'The Ace contains all ten cards within it. 1 is the undivided source of the Mind Row. It corresponds to Position 1: The Witness—the first "I AM" before any division.',
    symbolism: 'A single bolt of golden fire descending into a void. At its tip, the nine-pointed star of the complete matrix glows faintly—all positions present as potential within this single flash.',
    svgType: 'ace'
  },
  {
    id: 'two',
    number: 'II',
    label: 'TWO OF INITIATION',
    title: 'Two of Initiation',
    subtitle: 'Choosing the Path',
    directive: '"Two roads. Both real. One yours."',
    type: 'pip',
    color: 'fire',
    keywords: ['Choice','Tension','Direction','Bifurcation','Commitment','The Fork'],
    path_position: '1→2 Tension',
    upright: 'The Ace has fired. Now the question arrives: which way does this fire burn? You stand at the first genuine bifurcation of your initiation path. This is not paralysis—both options are alive, both contain possibility. But you can only embody one trajectory. Choose from your vision, not from your fear.',
    reversed: 'Choosing to not choose. Maintaining both options past the point where holding them serves you. The energy of initiation diffuses into endless deliberation, never condensing into momentum. Or: a choice made but not committed to—the half-turned key.',
    numerology: '2 introduces polarity into the primary path. 1+1=2. The tension between perception (1) and recognition (2) creates the dynamic that drives initiation forward.',
    symbolism: 'Two lightning paths diverge from a single point of origin. Each terminates in a different position on the 3×3 matrix. The space between them is charged—not empty, but undecided.',
    svgType: 'two'
  },
  {
    id: 'three',
    number: 'III',
    label: 'THREE OF INITIATION',
    title: 'Three of Initiation',
    subtitle: 'Creative Expression Emerging',
    directive: '"Give your vision a form the world can hold."',
    type: 'pip',
    color: 'fire',
    keywords: ['Expression','Emergence','Form','Creation','First Fruits','Manifestation'],
    path_position: '1→3 Creative Bridge',
    upright: 'The vision you perceived at 1 finds its first external form. The fire of initiation has matured enough to create—to produce something that exists outside your private experience. This is the first evidence that your path is real. What you are becoming is beginning to be visible.',
    reversed: 'Creative output without authentic vision behind it. Performing creativity rather than enacting it. Or: the opposite—vision so precious you refuse to expose it to the imperfection of manifestation. The painting that stays in your head because real paint would ruin it.',
    numerology: '3 is the Mind/Spirit position. Expression, joy, meaning-making. The triangle is complete: perception (1) flows through polarity (2) to find voice (3). This is the first closure of the mental realm.',
    symbolism: 'Three teal rays of light intersecting to form a triangle. Inside the triangle, sacred geometry assembles itself—the moment when pattern becomes language.',
    svgType: 'three'
  },
  {
    id: 'four',
    number: 'IV',
    label: 'FOUR OF INITIATION',
    title: 'Four of Initiation',
    subtitle: 'Structure Supporting Vision',
    directive: '"Build the container before you pour the fire."',
    type: 'pip',
    color: 'fire',
    keywords: ['Foundation','Framework','Preparation','Architecture','Discipline','Support'],
    path_position: '1→4 Structural Descent',
    upright: 'Your initiation path encounters the necessity of structure. Vision alone is not enough—transformation requires a container strong enough to hold the process. This card asks you to do the preparatory work, to build the scaffolding, to impose discipline not as a limit but as the very thing that will allow your fire to burn long enough to achieve its purpose.',
    reversed: 'Mistaking the scaffold for the cathedral. Structure that has outlived its function and become a cage. Or: refusing to build structure at all—letting fire burn freely but briefly, leaving nothing transformed.',
    numerology: '4 is the Body/Mind position. The mental organization of physical reality. 4 anchors the primary path into the material realm. Without 4, the 1→5→9 path floats without gravity.',
    symbolism: 'A perfect geometric cube of golden lines, its vertices grounded into the void-black field. Inside the cube, a controlled flame burns upward—contained, not diminished.',
    svgType: 'four'
  },
  {
    id: 'five',
    number: 'V',
    label: 'FIVE OF INITIATION',
    title: 'Five of Initiation',
    subtitle: 'The Central Test',
    directive: '"You cannot think your way through this. Act."',
    type: 'pip',
    color: 'fire',
    keywords: ['Embodiment','Testing','The Crucible','Participation','The Test','Direct Action'],
    path_position: 'Position 5 — THE CENTER',
    upright: 'You have arrived at the mandatory passage. All of the previous cards—the spark, the choice, the form, the structure—they have been preparation for this. Now there is only one thing to do: enter. The Five of Initiation demands that you act in the real world, that you submit your vision to the test of actual reality. Not planning. Not rehearsing. DOING. The fire of initiation is only purified through actual flame.',
    reversed: 'Endless preparation. The tenth revision. The moment when readiness becomes an excuse. Or: entering the test but not truly subjecting yourself to it—going through the motions while protecting your ego from genuine risk. Half-presence. Safe transformation.',
    numerology: 'The center of the entire system. 5 is the Body/Body position. All pathways converge here. 1+4=5, 2+3=5. This is not optional—every transformation must pass through embodied experience.',
    symbolism: 'A human figure of pure light standing in the center of nine converging pathways, each arriving from one of the nine matrix positions. The figure is neither entering nor leaving—it is the nexus.',
    svgType: 'five'
  },
  {
    id: 'six',
    number: 'VI',
    label: 'SIX OF INITIATION',
    title: 'Six of Initiation',
    subtitle: 'Integration of the Vision',
    directive: '"Let what you have lived change how you live."',
    type: 'pip',
    color: 'fire',
    keywords: ['Integration','Alignment','Living It','Behavior','Embodied Knowledge','The Frame'],
    path_position: 'Position 6 — The Frame',
    upright: 'Having passed through the Five, something has genuinely changed in you—not just as understanding but as behavior. The Six asks whether your outer life reflects your inner transformation. Are you actually different, or just informed? The integration of the initiation path is not intellectual—it is behavioral, relational, habitual. The fire must have changed the shape of the vessel.',
    reversed: 'The teaching becomes a performance. You speak about your transformation while living unchanged. The knowledge sits in the mind, unreached by the hands and feet. The frame has been announced but not built.',
    numerology: 'The perfect number: 1+2+3=6, 1×2×3=6. Every row in the 3×3 matrix sums to 6. The Six of Initiation is where the fire becomes architecture—no longer burning freely but becoming the substance of a life.',
    symbolism: 'A hexagonal frame of golden lines containing a living flame. Outside the frame, scattered embers. Inside, ordered, sustained combustion. The difference between destruction and warmth.',
    svgType: 'six'
  },
  {
    id: 'seven',
    number: 'VII',
    label: 'SEVEN OF INITIATION',
    title: 'Seven of Initiation',
    subtitle: 'Wisdom from the Journey',
    directive: '"Look back without nostalgia. Know what actually happened."',
    type: 'pip',
    color: 'fire',
    keywords: ['Reflection','Calibration','Wisdom','Assessment','Truth-Seeking','Recalibration'],
    path_position: 'Spirit/Mind — The Seeker',
    upright: 'You have moved, tested, integrated. Now comes the sacred pause of genuine reflection. The Seven does not ask you to celebrate or mourn your progress—it asks you to see it clearly. What did the path actually teach you, as opposed to what you wanted it to teach? The wisdom of initiation is only accessible when you are willing to be honest about your experience.',
    reversed: 'Reflection that becomes rumination. Analysis that becomes avoidance. The journal entry used as a substitute for the decision. Or: refusing to reflect at all—moving from action to action, accumulating experience without extracting wisdom.',
    numerology: '7 is the Spirit/Mind position. The Seeker—examining the observer, aligning belief with reality. In the Suit of Initiation, 7 is the turning point where the path begins bending toward completion.',
    symbolism: 'An amethyst eye examining a map of fire. The map shows the path traveled—not idealized, but exact. The eye reflects neither pride nor shame, only clear sight.',
    svgType: 'seven'
  },
  {
    id: 'eight',
    number: 'VIII',
    label: 'EIGHT OF INITIATION',
    title: 'Eight of Initiation',
    subtitle: 'Power Demonstrated',
    directive: '"You know this now. Show it in the world."',
    type: 'pip',
    color: 'fire',
    keywords: ['Mastery','Demonstration','Authority','Accountability','Power','Achievement'],
    path_position: 'Spirit/Body — The Master',
    upright: 'The fire has become skill. The Eight marks the moment when your initiation manifests as genuine capability—something you can apply, demonstrate, and be held accountable for. This is the card of earned authority. Not the proclamation of mastery but its quiet demonstration. Others can see it now. More importantly, you can be relied upon.',
    reversed: 'Authority claimed before it is earned. The performance of mastery that lacks the embodied foundation. Or: mastery earned but unexpressed—capability hidden away from the world, never offered, never tested in relationship.',
    numerology: '8 is the Spirit/Body position. Knowledge applied through character, directed energy. The Suit of Initiation reaches its peak expression here before final completion. 8 contains the lemniscate—the infinite loop of giving and receiving mastery.',
    symbolism: 'Two hands channeling a column of fire between them. The fire is fully controlled—not tamed, but directed. Sacred geometry around the hands shows the mathematical precision of mastered force.',
    svgType: 'eight'
  },
  {
    id: 'nine',
    number: 'IX',
    label: 'NINE OF INITIATION',
    title: 'Nine of Initiation',
    subtitle: 'Near Completion',
    directive: '"Release your grip. Let the path complete itself."',
    type: 'pip',
    color: 'fire',
    keywords: ['Threshold','Near Completion','Trust','Final Steps','Letting Go','The Edge'],
    path_position: 'Approaching Position 9',
    upright: 'You are close. The Nine is the threshold—almost, but not yet. The completion that the Ten represents cannot be forced or rushed. The Nine asks for a particular quality of presence: commitment without grasping, movement without urgency. You have done the work. The final step is learning to let it land.',
    reversed: 'Near the finish but creating obstacles to prevent completion. Fear of the ending—because ending means no longer having the identity of the one on the path. Or: impatience that overshoots completion into a new beginning before the current cycle has truly closed.',
    numerology: '9 is the Spirit/Spirit position. 9 is the number of completion, the final single digit. In the Suit of Initiation, the Nine carries the tension of almost—3×3 is complete at 9, but the ten that names full cycle completion awaits.',
    symbolism: 'A figure at the edge of a cliff made of light. Below: the void, stars, the zero. In the figure\'s chest, a flame has become a star. One more step. The path ends in open sky.',
    svgType: 'nine'
  },
  {
    id: 'ten',
    number: 'X',
    label: 'TEN OF INITIATION',
    title: 'Ten of Initiation',
    subtitle: 'Full Cycle Achieved',
    directive: '"The path completes. The zero opens."',
    type: 'pip',
    color: 'fire',
    keywords: ['Completion','Cycle','Full Circle','Legacy','Transmutation','Return to Zero'],
    path_position: '1→5→9 Complete',
    upright: 'The primary diagonal is complete. What began as a spark (Ace) has moved through choice, expression, structure, the test of embodiment, integration, wisdom, mastery, and threshold—and arrived here, at the full manifestation of the initiation path. The Ten is not an ending but a completion. Notice the difference. From here, the zero opens again—the same journey, at a higher octave.',
    reversed: 'Reaching completion but refusing to acknowledge it. Carrying a finished cycle as though it still needs to be lived. The weight of a completed path, exhausting because you will not set it down. Or: completing the external cycle without completing the internal one—the form finished, the transformation not yet integrated.',
    numerology: '10 = 1+0 = 1. The Ten returns to the Ace. But it is not the same 1—it is 1 at a new level of the spiral. The 1→5→9 path is encoded in 10: 1 (origin), then 5 (the crucible at center), then 9 (completion). All three primary positions in a single number.',
    symbolism: 'The 3×3 matrix ablaze—all nine positions connected by golden fire. At the center (5), the brightest light. The entire grid becomes a single mandala of completion, and at its heart, a zero is forming.',
    svgType: 'ten'

      <!-- Zero forming at center -->

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 340">${svgGenerators[card.svgType]()}</svg>`;
}

function renderCards(filter) {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  CARDS.filter(c => filter === 'all' || c.type === filter).forEach(card => {
    const div = document.createElement('div');
    div.className = 'tarot-card';
    div.innerHTML = `<div class="card-inner">${generateCardSVG(card)}</div>`;
    div.onclick = () => openModal(card);
    grid.appendChild(div);
  });
}

function filterCards(type) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderCards(type);
}

function openModal(card) {
  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');
  const isDiag = card.id === 'ace' || card.id === 'five' || card.id === 'ten' || card.id === 'king';

  content.innerHTML = `
    <div class="modal-card">${generateCardSVG(card)}</div>
    <div class="modal-text">
      <div class="modal-number">Suit of Initiation · ${card.label}</div>
      <div class="modal-title">${card.title}</div>
      <div class="modal-directive">${card.directive}</div>
      <div class="modal-keywords">${card.keywords.map(k => `<span class="keyword">${k}</span>`).join('')}</div>
      <div class="modal-section-title">Matrix Position</div>
      <p>${card.path_position}</p>
      <div class="modal-section-title">Symbolism</div>
      <p>${card.symbolism}</p>
      <div class="modal-section-title">Upright</div>
      <p>${card.upright}</p>
      <div class="modal-section-title">Reversed</div>
      <p class="modal-reversed">${card.reversed}</p>
      <div class="modal-numerology">${card.numerology}</div>
    </div>`;
  overlay.classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeAllModal();
}

function closeAllModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeAllModal(); });

renderCards('all');
</script>
</body>
</html>
