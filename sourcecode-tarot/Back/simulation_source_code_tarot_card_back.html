<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#05040a; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:2rem; }

:root {
  --void: #05040a;
  --void2: #0d0b18;
  --gold: #c9a84c;
  --gold-bright: #e8c96b;
  --gold-dim: #7a6230;
  --teal: #4a9494;
  --teal-bright: #7ec8c8;
  --teal-dim: #2a5555;
  --amethyst: #7b4fa6;
  --amethyst-bright: #a96ed4;
  --fire: #e8593c;
  --fire-bright: #f5a623;
}

.card-container {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2rem;
}

.card-wrap {
  width:280px;
  aspect-ratio:0.578;
  filter: drop-shadow(0 0 40px rgba(201,168,76,0.2));
}

@keyframes pulse-teal {
  0%,100% { opacity:0.9; r:10; }
  50% { opacity:1; r:12; }
}
@keyframes pulse-node {
  0%,100% { opacity:0.5; }
  50% { opacity:0.8; }
}
@keyframes rotate-outer {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
@keyframes rotate-inner {
  from { transform: rotate(0deg); }
  to { transform: rotate(-360deg); }
}
@keyframes glow-gold {
  0%,100% { opacity:0.15; }
  50% { opacity:0.35; }
}
@keyframes breath-matrix {
  0%,100% { opacity:0.55; }
  50% { opacity:0.85; }
}

.ring-outer {
  transform-origin: 140px 220px;
  animation: rotate-outer 40s linear infinite;
}
.ring-inner {
  transform-origin: 140px 220px;
  animation: rotate-inner 25s linear infinite;
}
.center-pulse {
  animation: pulse-teal 2.5s ease-in-out infinite;
}
.node-pulse {
  animation: pulse-node 3s ease-in-out infinite;
}
.node-pulse:nth-child(2) { animation-delay: 0.5s; }
.node-pulse:nth-child(3) { animation-delay: 1s; }
.node-pulse:nth-child(4) { animation-delay: 1.5s; }
.node-pulse:nth-child(5) { animation-delay: 0.3s; }
.node-pulse:nth-child(6) { animation-delay: 0.8s; }
.node-pulse:nth-child(7) { animation-delay: 1.3s; }
.node-pulse:nth-child(8) { animation-delay: 1.8s; }
.void-glow {
  animation: glow-gold 4s ease-in-out infinite;
}
.matrix-group {
  animation: breath-matrix 4s ease-in-out infinite;
}
</style>
</head>
<body>
<div class="card-container">
  <div class="card-wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 484" width="100%">
  <defs>
    <!-- Starfield filter -->
    <filter id="star-blur">
      <feGaussianBlur stdDeviation="0.3"/>
    </filter>
    
    <!-- Teal glow for center -->
    <filter id="teal-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>

    <!-- Gold glow -->
    <filter id="gold-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>

    <!-- Node glow -->
    <filter id="node-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>

    <!-- Amethyst glow -->
    <filter id="amethyst-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
    
    <!-- Radial gradient for void background center -->
    <radialGradient id="voidCenter" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#12102a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#05040a" stop-opacity="1"/>
    </radialGradient>

    <!-- Matrix line gradient -->
    <linearGradient id="matrixLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#c9a84c" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0.1"/>
    </linearGradient>
    
    <!-- Zero circle gradient -->
    <radialGradient id="zeroGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a9494" stop-opacity="0.08"/>
      <stop offset="70%" stop-color="#4a9494" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#4a9494" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip for card shape -->
    <clipPath id="cardClip">
      <rect x="0" y="0" width="280" height="484" rx="8"/>
    </clipPath>
  </defs>

  <!-- CARD BASE -->
  <rect x="0" y="0" width="280" height="484" rx="8" fill="url(#voidCenter)"/>
  
  <!-- Starfield -->
  <g clip-path="url(#cardClip)" filter="url(#star-blur)">

    <circle cx="268" cy="240" r="0.5" fill="white" opacity="0.3"/>

    <polygon points="140,300 87,208 193,208" fill="none" stroke="#c9a84c" stroke-width="0.4" opacity="0.18"/>

  <!-- SUBTLE RADIANT LINES from center -->

    <line x1="140" y1="230" x2="140" y2="370"/>
    <line x1="140" y1="230" x2="80" y2="335"/>
    <line x1="140" y1="230" x2="42" y2="278"/>
    <line x1="140" y1="230" x2="30" y2="230"/>
    <line x1="140" y1="230" x2="42" y2="182"/>
    <line x1="140" y1="230" x2="80" y2="125"/>
  </g>

  <!-- THE 3×3 MATRIX: 9 positions -->
  <!-- Positions: 
    7(Spirit/Mind) 8(Spirit/Body) 9(Spirit/Spirit)
    4(Body/Mind)   5(Body/Body)   6(Body/Spirit)
    1(Mind/Mind)   2(Mind/Body)   3(Mind/Spirit)
  -->
  <!-- Matrix connection lines (between all 9 nodes) -->
  <g class="matrix-group" opacity="0.18" stroke="#c9a84c" stroke-width="0.5">
    <!-- Row 1 (top/spirit) -->
    <line x1="90" y1="165" x2="140" y2="165"/>
    <line x1="140" y1="165" x2="190" y2="165"/>
    <!-- Row 2 (middle/body) -->
    <line x1="90" y1="230" x2="140" y2="230"/>
    <line x1="140" y1="230" x2="190" y2="230"/>
    <!-- Row 3 (bottom/mind) -->
    <line x1="90" y1="295" x2="140" y2="295"/>
    <line x1="140" y1="295" x2="190" y2="295"/>
    <!-- Col 1 (left/mind) -->
    <line x1="90" y1="165" x2="90" y2="230"/>
    <line x1="90" y1="230" x2="90" y2="295"/>
    <!-- Col 2 (center) -->
    <line x1="140" y1="165" x2="140" y2="230"/>
    <line x1="140" y1="230" x2="140" y2="295"/>
    <!-- Col 3 (right/spirit) -->
    <line x1="190" y1="165" x2="190" y2="230"/>
    <line x1="190" y1="230" x2="190" y2="295"/>
    <!-- Primary diagonal 1→5→9 HIGHLIGHTED -->
  </g>
  <!-- Primary diagonal 1→5→9 (fire path) -->
  <g opacity="0.35" stroke="#e8593c" stroke-width="0.8" stroke-dasharray="2 2">
    <line x1="90" y1="295" x2="140" y2="230"/>
    <line x1="140" y1="230" x2="190" y2="165"/>
  </g>
  <!-- Counter diagonal 7→5→3 (teal path) -->
  <g opacity="0.25" stroke="#4a9494" stroke-width="0.6" stroke-dasharray="2 3">
    <line x1="90" y1="165" x2="140" y2="230"/>
    <line x1="140" y1="230" x2="190" y2="295"/>
  </g>

  <!-- SPIRIT ROW NODES (7, 8, 9) - Amethyst -->
  <!-- Node 7: Spirit/Mind -->
  <g class="node-pulse" filter="url(#amethyst-glow)">
    <circle cx="90" cy="165" r="7" fill="#7b4fa6" opacity="0.6"/>
    <circle cx="90" cy="165" r="4" fill="#a96ed4" opacity="0.85"/>
    <circle cx="90" cy="165" r="1.5" fill="#d4a0f0" opacity="0.9"/>
  </g>
  <!-- Node 8: Spirit/Body -->
  <g class="node-pulse" filter="url(#amethyst-glow)">
    <circle cx="140" cy="165" r="7" fill="#7b4fa6" opacity="0.6"/>
    <circle cx="140" cy="165" r="4" fill="#a96ed4" opacity="0.85"/>
    <circle cx="140" cy="165" r="1.5" fill="#d4a0f0" opacity="0.9"/>

  <!-- Node 9: Spirit/Spirit (completion - gold) -->
  <g filter="url(#gold-glow)">

  <!-- BODY ROW NODES (4, 5, 6) - Gold -->

    <circle cx="90" cy="230" r="7" fill="#c9a84c" opacity="0.5"/>

  <!-- DECORATIVE HORIZONTAL DIVIDERS -->
  <line x1="20" y1="130" x2="100" y2="130" stroke="url(#matrixLine)" stroke-width="0.5" opacity="0.5"/>
  <line x1="180" y1="130" x2="260" y2="130" stroke="url(#matrixLine)" stroke-width="0.5" opacity="0.5"/>
  <!-- Small diamonds on dividers -->
  <polygon points="140,126 144,130 140,134 136,130" fill="#c9a84c" opacity="0.3"/>
