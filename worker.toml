# SSC Cloudflare Worker — wrangler.toml
# Deploy with: npx wrangler deploy

name = "ssc-site"
main = "netlify/functions/worker.js"
compatibility_date = "2024-01-01"

[vars]
FROM_EMAIL = "readings@simulationsourcecode.com"
# Secrets — set via dashboard or:
# npx wrangler secret put STRIPE_SECRET
# npx wrangler secret put STRIPE_WEBHOOK_SECRET
# npx wrangler secret put ANTHROPIC_API_KEY
# npx wrangler secret put PDFSHIFT_API_KEY
# npx wrangler secret put RESEND_API_KEY
# npx wrangler secret put REPLY_TO_EMAIL

[[routes]]
pattern   = "simulationsourcecode.com/api/session"
zone_name = "simulationsourcecode.com"

[[routes]]
pattern   = "simulationsourcecode.com/submit-email"
zone_name = "simulationsourcecode.com"

[[routes]]
pattern   = "simulationsourcecode.com/webhook/stripe"
zone_name = "simulationsourcecode.com"

[observability]
[observability.logs]
enabled = true
invocation_logs = true

# Queue for long-running reading generation (Anthropic → PDFShift → Resend)
# Create the queue first: npx wrangler queues create ssc-readings
[[queues.producers]]
queue   = "ssc-readings"
binding = "READINGS_QUEUE"

[[queues.consumers]]
queue             = "ssc-readings"
max_batch_size    = 1      # one reading at a time
max_retries       = 3      # retry up to 3 times on failure
max_batch_timeout = 0      # process immediately, no batching delay