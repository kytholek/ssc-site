<!-- ════ CALCULATOR PAGE ════ -->
<div class="page" id="page-calculator">
  <div class="calc-page-hero a0">
    <div class="calc-page-eyebrow">Simulation Source Code</div>
    <h1 class="calc-page-title">Numerology Decoder</h1>
    <p class="calc-page-sub">Enter your birth details to reveal your seven encoded frequencies.</p>
  </div>
  <div class="calc-container">
    <div class="form-card a1">
      <div class="form-section-label">&#xB7; Birth Date &#xB7;</div>
      <div class="date-row">
        <div class="field"><label>Month</label>
          <select id="calc-month">
            <option value="">&#8212;</option>
            <option value="1">January</option><option value="2">February</option><option value="3">March</option>
            <option value="4">April</option><option value="5">May</option><option value="6">June</option>
            <option value="7">July</option><option value="8">August</option><option value="9">September</option>
            <option value="10">October</option><option value="11">November</option><option value="12">December</option>
          </select>
        </div>
        <div class="field"><label>Day</label><input type="number" id="calc-day" placeholder="DD" min="1" max="31"></div>
        <div class="field"><label>Year</label><input type="number" id="calc-year" placeholder="YYYY" min="1900" max="2099"></div>
      </div>
      <div class="form-section-label" style="margin-top:28px">&#xB7; Full Birth Name &#xB7;</div>
      <div class="field"><label>Full Name (as on birth certificate)</label><input type="text" id="calc-fullname" placeholder="e.g. Jane Marie Smith" autocomplete="off"></div>
    </div>
    <button class="calc-btn a2" onclick="calculateReading()">&#11041;&nbsp;Decode My Map&nbsp;&#11041;</button>
    <div class="results-placeholder a3" id="results-area">
      <div class="results-placeholder-icon">&#10022;</div>
      <div class="results-placeholder-text">Your reading will appear here</div>
    </div>
  </div>
</div><!-- /page-calculator -->
