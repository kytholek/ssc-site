<!-- ════ CALCULATOR PAGE ════ -->
<div class="page" id="page-calculator">
  <div class="calc-page-hero a0">
    <div class="calc-page-eyebrow" data-i18n="calc.eyebrow">Simulation Source Code</div>
    <h1 class="calc-page-title" data-i18n="calc.title">Frequency Decoder</h1>
    <p class="calc-page-sub" data-i18n="calc.subtitle">Enter your birth details to reveal your seven encoded frequencies.</p>
  </div>
  <div class="calc-container">
    <div class="form-card a1">
      <div class="form-section-label" data-i18n="calc.label.birthdate">&#xB7; Birth Date &#xB7;</div>
      <div class="date-row">
        <div class="field">
          <label data-i18n="calc.label.month">Month</label>
          <select id="calc-month">
            <option value="">&#8212;</option>
            <option value="1"  data-i18n="calc.month.1">January</option>
            <option value="2"  data-i18n="calc.month.2">February</option>
            <option value="3"  data-i18n="calc.month.3">March</option>
            <option value="4"  data-i18n="calc.month.4">April</option>
            <option value="5"  data-i18n="calc.month.5">May</option>
            <option value="6"  data-i18n="calc.month.6">June</option>
            <option value="7"  data-i18n="calc.month.7">July</option>
            <option value="8"  data-i18n="calc.month.8">August</option>
            <option value="9"  data-i18n="calc.month.9">September</option>
            <option value="10" data-i18n="calc.month.10">October</option>
            <option value="11" data-i18n="calc.month.11">November</option>
            <option value="12" data-i18n="calc.month.12">December</option>
          </select>
        </div>
        <div class="field">
          <label data-i18n="calc.label.day">Day</label>
          <input type="number" id="calc-day" placeholder="DD" min="1" max="31">
        </div>
        <div class="field">
          <label data-i18n="calc.label.year">Year</label>
          <input type="number" id="calc-year" placeholder="YYYY" min="1900" max="2099">
        </div>
      </div>
      <div class="form-section-label" style="margin-top:28px" data-i18n="calc.label.fullname">&#xB7; Full Birth Name &#xB7;</div>
      <div class="field">
        <label data-i18n="calc.label.namehint">Full Name (as on birth certificate)</label>
        <input type="text" id="calc-fullname" data-i18n-placeholder="calc.placeholder.name" placeholder="e.g. Jane Marie Smith" autocomplete="off">
      </div>
    </div>
    <button class="calc-btn a2" onclick="calculateReading()" data-i18n="calc.btn">&#11041;&nbsp;Decode My Map&nbsp;&#11041;</button>
    <div class="results-placeholder a3" id="results-area">
      <div class="results-placeholder-icon">&#10022;</div>
      <div class="results-placeholder-text" data-i18n="calc.results.placeholder">Your reading will appear here</div>
    </div>
  </div>
</div><!-- /page-calculator -->
