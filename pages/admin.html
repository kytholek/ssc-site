<!-- ════════════════════════════════════════════════════════════
     ADMIN OVERLAY — Blog CMS
     Trigger: Ctrl+Shift+A  |  or navigate to #admin
     Password: ssc2025  (change PASS in the JS above)
════════════════════════════════════════════════════════════ -->

<!-- Hidden trigger in footer copyright (click 5×) -->
<span id="admin-trigger" style="cursor:default;user-select:none">&#169;</span>

<div id="admin-toast"></div>

<div id="admin-overlay">

  <!-- Login screen -->
  <div id="admin-login">
    <div id="admin-login-box">
      <div style="font-family:'Cinzel',serif;font-size:9px;letter-spacing:.4em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:6px">Simulation Source Code</div>
      <div style="font-family:'Cinzel',serif;font-size:18px;color:var(--gold);margin-bottom:28px">Admin</div>
      <input id="admin-pass-input" type="password" placeholder="Passphrase" autocomplete="off"
        style="width:100%;padding:12px 16px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'EB Garamond',serif;font-size:16px;outline:none;margin-bottom:10px"
        onkeydown="if(event.key==='Enter') adminSystem.login()">
      <div id="admin-login-error" style="color:#e06060;font-size:13px;min-height:18px;margin-bottom:14px"></div>
      <button onclick="adminSystem.login()" style="width:100%;padding:12px;background:var(--gold);color:#0a0800;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.2em;border:none;border-radius:4px;cursor:pointer">Enter</button>
      <button onclick="adminSystem.close()" style="display:block;margin:14px auto 0;background:none;border:none;color:var(--text-dim);font-size:13px;cursor:pointer;font-family:'EB Garamond',serif">Cancel</button>
    </div>
  </div>

  <!-- Admin panel -->
  <div id="admin-panel">
    <div id="admin-header">
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:.3em;color:var(--gold);text-transform:uppercase">&#10022; SSC Admin</span>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="admin-tab-btn active" id="tab-btn-write"  onclick="adminSystem.switchTab('write')">Write</button>
        <button class="admin-tab-btn"        id="tab-btn-preview" onclick="adminSystem.switchTab('preview')">Preview</button>
        <button class="admin-tab-btn"        id="tab-btn-posts"  onclick="adminSystem.switchTab('posts')">Posts</button>
        <button class="admin-tab-btn"        id="tab-btn-export" onclick="adminSystem.switchTab('export')">Export</button>
        <button onclick="adminSystem.close()" style="margin-left:8px;background:none;border:1px solid rgba(255,255,255,.12);color:var(--text-dim);border-radius:4px;padding:6px 12px;cursor:pointer;font-size:13px">&#10005;</button>
      </div>
    </div>

    <!-- TAB: Write -->
    <div class="admin-tab active" id="tab-write">
      <input type="hidden" id="admin-editing-id">
      <div id="admin-fields">
        <div style="display:grid;grid-template-columns:1fr auto auto;gap:10px;margin-bottom:12px">
          <input id="admin-title" type="text" placeholder="Post title…" autocomplete="off">
          <select id="admin-category">
            <option value="numerology">Numerology</option>
            <option value="philosophy">Philosophy</option>
            <option value="numbers">The Numbers</option>
            <option value="practice">Practice</option>
          </select>
          <input id="admin-date" type="text" placeholder="Month YYYY" style="width:130px" autocomplete="off">
        </div>
        <input id="admin-excerpt" type="text" placeholder="Short excerpt for the card (optional)…" autocomplete="off" style="width:100%;margin-bottom:12px">
        <div id="admin-toolbar">
          <button title="Heading"    onclick="adminSystem.wrap('### ','','heading')"><b>H</b></button>
          <button title="Bold"       onclick="adminSystem.wrap('**','**')"><b>B</b></button>
          <button title="Italic"     onclick="adminSystem.wrap('*','*')"><em>I</em></button>
          <button title="Blockquote" onclick="adminSystem.wrap('> ','','quote')">&#8220;&#8221;</button>
          <button title="Paragraph break" onclick="adminSystem.insertBreak()">&#182;</button>
        </div>
        <textarea id="admin-body" placeholder="Write your post here. Use ### for headings, **bold**, *italic*, and > for blockquotes.&#10;&#10;A blank line starts a new paragraph."></textarea>
      </div>
      <div id="admin-actions">
        <button class="admin-btn-ghost" onclick="adminSystem.clearForm()">Clear</button>
        <button class="admin-btn-primary" onclick="adminSystem.publish()">Publish Post</button>
      </div>
    </div>

    <!-- TAB: Preview -->
    <div class="admin-tab" id="tab-preview">
      <div id="admin-preview-content" style="max-width:700px;margin:0 auto;padding:40px 0">
        <div class="admin-empty">Fill in the Write tab to see a preview.</div>
      </div>
    </div>

    <!-- TAB: Posts -->
    <div class="admin-tab" id="tab-posts">
      <div id="admin-posts-list-inner" style="padding:24px 0"></div>
    </div>

    <!-- TAB: Export -->
    <div class="admin-tab" id="tab-export">
      <div style="padding:24px 0">
        <p style="color:var(--text-dim);font-size:14px;margin-bottom:16px">Copy this code and paste it into your <code style="color:var(--gold);font-size:12px">index.html</code> to make posts permanent — cards into <code style="color:var(--gold);font-size:12px">#blog-grid</code>, posts before the closing blog div.</p>
        <button class="admin-btn-primary" onclick="adminSystem.exportCode()" style="margin-bottom:16px">&#8635; Generate Export Code</button>
        <textarea id="admin-export-output" readonly style="height:420px;font-size:11px;font-family:'Courier New',monospace;color:var(--teal-light)" placeholder="Click Generate to produce the HTML code for your posts…"></textarea>
      </div>
    </div>

  </div><!-- /admin-panel -->
</div><!-- /admin-overlay -->
