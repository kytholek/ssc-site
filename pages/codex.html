<div class="page" id="page-codex">
<style>
/* ══ Codex Page ════════════════════════════════════════════ */

.cdx-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  background: radial-gradient(ellipse at 50% 48%, rgba(201,168,76,0.05) 0%, transparent 60%);
}

/* ── Pre-initiation gate ── */
.cdx-gate {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
  position: absolute;
  transition: opacity .4s ease, transform .5s ease;
  z-index: 2;
}
.cdx-gate-eyebrow {
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: .55em;
  text-transform: uppercase;
  color: rgba(201,168,76,0.3);
  text-align: center;
}

/* ── The circular button ── */
.cdx-btn {
  position: relative;
  width: 180px;
  height: 180px;
  border-radius: 50%;
  background: rgba(5,4,10,0.96);
  border: 1px solid rgba(201,168,76,0.45);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: cdx-breathe 3.5s ease-in-out infinite;
  transition: border-color .3s, box-shadow .3s;
}
.cdx-btn:hover {
  border-color: rgba(201,168,76,0.75);
  box-shadow: 0 0 55px rgba(201,168,76,0.22);
}
/* Outer rotating dashed ring */
.cdx-btn::before {
  content: '';
  position: absolute;
  width: 216px;
  height: 216px;
  border-radius: 50%;
  border: 1px dashed rgba(201,168,76,0.18);
  animation: cdx-spin 28s linear infinite;
  pointer-events: none;
}
/* Second ring */
.cdx-btn::after {
  content: '';
  position: absolute;
  width: 198px;
  height: 198px;
  border-radius: 50%;
  border: 1px solid rgba(201,168,76,0.07);
  pointer-events: none;
}
@keyframes cdx-breathe {
  0%,100% { box-shadow: 0 0 25px rgba(201,168,76,0.07), inset 0 0 18px rgba(201,168,76,0.04); }
  50%      { box-shadow: 0 0 55px rgba(201,168,76,0.18), inset 0 0 28px rgba(201,168,76,0.08); }
}
@keyframes cdx-spin { to { transform: rotate(360deg); } }

.cdx-btn-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  pointer-events: none;
}
.cdx-btn-label-top,
.cdx-btn-label-bot {
  font-family: 'Cinzel', serif;
  font-size: 7px;
  letter-spacing: .52em;
  text-transform: uppercase;
  color: rgba(201,168,76,0.6);
  line-height: 1;
}
.cdx-btn-glyph {
  font-size: 30px;
  color: rgba(201,168,76,0.4);
  line-height: 1;
  transition: color .3s;
}
.cdx-btn:hover .cdx-btn-glyph { color: rgba(201,168,76,0.8); }

/* ── Fade out gate when active ── */
#page-codex.cdx-active .cdx-gate {
  opacity: 0;
  transform: scale(.55);
  pointer-events: none;
}

/* ── Revealed canvas ── */
.cdx-canvas {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 36px;
  opacity: 0;
  transform: scale(0.02);
  transform-origin: center center;
  transition: opacity .6s ease .15s, transform 1s cubic-bezier(.22,1,.36,1) .1s;
  pointer-events: none;
}
#page-codex.cdx-active .cdx-canvas {
  opacity: 1;
  transform: scale(1);
  pointer-events: all;
}

.cdx-canvas-title {
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: .6em;
  text-transform: uppercase;
  color: rgba(201,168,76,0.3);
  text-align: center;
  opacity: 0;
  transition: opacity .7s ease 1.6s;
}
#page-codex.cdx-active .cdx-canvas-title { opacity: 1; }

/* ── SVG ── */
.cdx-svg {
  width: min(520px, 88vw);
  height: auto;
  overflow: visible;
  filter: drop-shadow(0 0 40px rgba(201,168,76,0.12));
  transition: filter .5s;
}
#page-codex.cdx-active:hover .cdx-svg {
  filter: drop-shadow(0 0 60px rgba(201,168,76,0.22));
}

/* Lines */
.cdx-svg-line {
  stroke: rgba(201,168,76,0.32);
  stroke-width: 1;
  fill: none;
  stroke-dasharray: 130;
  stroke-dashoffset: 130;
}
#page-codex.cdx-active .cdx-svg-line {
  animation: cdx-draw .7s ease forwards;
}
@keyframes cdx-draw { to { stroke-dashoffset: 0; } }

/* Nodes */
.cdx-svg-node {
  opacity: 0;
  transform-box: fill-box;
  transform-origin: center;
}
#page-codex.cdx-active .cdx-svg-node {
  animation: cdx-node-pop .45s ease forwards;
}
@keyframes cdx-node-pop {
  from { opacity: 0; transform: scale(.3); }
  to   { opacity: 1; transform: scale(1); }
}
.cdx-svg-node circle {
  fill: #08070f;
  stroke: rgba(201,168,76,0.5);
  stroke-width: 1.2;
  transition: stroke .3s, filter .3s;
}
.cdx-svg-node text {
  fill: rgba(201,168,76,0.75);
  font-family: 'Cinzel', serif;
  font-size: 15px;
  transition: fill .3s;
}
/* Center node */
.cdx-svg-node--center circle {
  stroke: rgba(201,168,76,0.8);
}
.cdx-svg-node--center text { fill: rgba(201,168,76,1); }

#page-codex.cdx-active .cdx-svg-node--center circle {
  animation: cdx-node-pop .45s ease forwards, cdx-center-glow 3.2s ease-in-out infinite 2s;
}
@keyframes cdx-center-glow {
  0%,100% { filter: drop-shadow(0 0 4px rgba(201,168,76,0.35)); }
  50%      { filter: drop-shadow(0 0 18px rgba(201,168,76,0.9)); }
}

/* Reset button */
.cdx-reset {
  font-family: 'Cinzel', serif;
  font-size: 7px;
  letter-spacing: .3em;
  text-transform: uppercase;
  color: rgba(201,168,76,0.18);
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px 12px;
  opacity: 0;
  transition: opacity .5s ease 2.2s, color .25s;
}
.cdx-reset:hover { color: rgba(201,168,76,0.5); }
#page-codex.cdx-active .cdx-reset { opacity: 1; }

/* ── Responsive ── */
@media (max-width: 600px) {
  .cdx-btn { width: 156px; height: 156px; }
  .cdx-btn::before { width: 190px; height: 190px; }
  .cdx-btn::after  { width: 172px; height: 172px; }
}
</style>

<div class="cdx-wrap">

  <!-- Pre-initiation -->
  <div class="cdx-gate" id="cdx-gate">
    <div class="cdx-gate-eyebrow">The Consciousness Matrix</div>
    <button class="cdx-btn" id="cdx-btn"
      onclick="document.getElementById('page-codex').classList.add('cdx-active')">
      <div class="cdx-btn-inner">
        <span class="cdx-btn-label-top">Initiate</span>
        <span class="cdx-btn-glyph">&#9711;</span>
        <span class="cdx-btn-label-bot">Codex</span>
      </div>
    </button>
  </div>

  <!-- Revealed codex -->
  <div class="cdx-canvas" id="cdx-canvas">
    <div class="cdx-canvas-title">The Nine Frequencies</div>

    <svg class="cdx-svg" viewBox="14 24 272 258" xmlns="http://www.w3.org/2000/svg">

      <!-- Lines — staggered draw after expansion (~0.3s base + stagger) -->
      <line class="cdx-svg-line" x1="150" y1="40"  x2="90"  y2="100" style="animation-delay:.3s"/>
      <line class="cdx-svg-line" x1="150" y1="40"  x2="210" y2="100" style="animation-delay:.4s"/>
      <line class="cdx-svg-line" x1="90"  y1="100" x2="150" y2="160" style="animation-delay:.5s"/>
      <line class="cdx-svg-line" x1="210" y1="100" x2="150" y2="160" style="animation-delay:.5s"/>
      <line class="cdx-svg-line" x1="150" y1="160" x2="50"  y2="160" style="animation-delay:.62s"/>
      <line class="cdx-svg-line" x1="150" y1="160" x2="250" y2="160" style="animation-delay:.62s"/>
      <line class="cdx-svg-line" x1="150" y1="160" x2="90"  y2="220" style="animation-delay:.74s"/>
      <line class="cdx-svg-line" x1="150" y1="160" x2="210" y2="220" style="animation-delay:.74s"/>
      <line class="cdx-svg-line" x1="90"  y1="220" x2="150" y2="270" style="animation-delay:.86s"/>
      <line class="cdx-svg-line" x1="210" y1="220" x2="150" y2="270" style="animation-delay:.86s"/>

      <!-- Nodes — appear after lines -->
      <g font-size="15" text-anchor="middle" dominant-baseline="middle">
        <g class="cdx-svg-node" style="animation-delay:1.05s">
          <circle cx="150" cy="40"  r="16"/><text x="150" y="40">2</text>
        </g>
        <g class="cdx-svg-node" style="animation-delay:1.15s">
          <circle cx="90"  cy="100" r="16"/><text x="90"  y="100">1</text>
        </g>
        <g class="cdx-svg-node" style="animation-delay:1.15s">
          <circle cx="210" cy="100" r="16"/><text x="210" y="100">3</text>
        </g>
        <g class="cdx-svg-node" style="animation-delay:1.25s">
          <circle cx="50"  cy="160" r="16"/><text x="50"  y="160">4</text>
        </g>
        <g class="cdx-svg-node cdx-svg-node--center" style="animation-delay:1.25s">
          <circle cx="150" cy="160" r="20"/><text x="150" y="160">5</text>
        </g>
        <g class="cdx-svg-node" style="animation-delay:1.25s">
          <circle cx="250" cy="160" r="16"/><text x="250" y="160">6</text>
        </g>
        <g class="cdx-svg-node" style="animation-delay:1.35s">
          <circle cx="90"  cy="220" r="16"/><text x="90"  y="220">7</text>
        </g>
        <g class="cdx-svg-node" style="animation-delay:1.35s">
          <circle cx="210" cy="220" r="16"/><text x="210" y="220">9</text>
        </g>
        <g class="cdx-svg-node" style="animation-delay:1.45s">
          <circle cx="150" cy="270" r="16"/><text x="150" y="270">8</text>
        </g>
      </g>
    </svg>

    <button class="cdx-reset"
      onclick="document.getElementById('page-codex').classList.remove('cdx-active')">
      &#8635;&nbsp;Reset
    </button>
  </div>

</div>
</div>
