# Cloudflare Workers + static site (simulationsourcecode.com)
# Deploy: npx wrangler deploy
# Secrets (Dashboard → Worker → Settings → Variables):
#   STRIPE_SECRET, STRIPE_WEBHOOK_SECRET, ANTHROPIC_API_KEY,
#   PDFSHIFT_API_KEY, RESEND_API_KEY, FROM_EMAIL

name = "ssc-site"
main = "netlify/functions/worker.js"
compatibility_date = "2024-09-23"

[assets]
directory = "."
binding = "ASSETS"
run_worker_first = true
not_found_handling = "single-page-application"
