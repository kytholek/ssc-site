name: Build Blog From Markdown

on:
  push:
    branches: ["main"]
    paths:
      - "content/**"
      - "build.js"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build generated blog files
        run: node build.js --force

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- blog content/posts.json; then
            echo "No generated changes to commit."
            exit 0
          fi

          git add blog content/posts.json
          git commit -m "chore(blog): regenerate static blog from markdown"
          git push